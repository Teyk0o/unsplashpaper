name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests pystray Pillow pyinstaller
      - name: Build exe
        run: python build.py
      - name: Build installer
        run: |
          choco install innosetup -y
          iscc installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: UnsplashPaper-Windows
          path: |
            dist/UnsplashPaper.exe
            installer_output/UnsplashPaper_Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests pystray Pillow pyinstaller
      - name: Build app
        run: python build.py
      - name: Create .app bundle
        run: |
          mkdir -p UnsplashPaper.app/Contents/MacOS
          mkdir -p UnsplashPaper.app/Contents/Resources
          cp dist/UnsplashPaper UnsplashPaper.app/Contents/MacOS/UnsplashPaper
          chmod +x UnsplashPaper.app/Contents/MacOS/UnsplashPaper
          cat > UnsplashPaper.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>UnsplashPaper</string>
              <key>CFBundleDisplayName</key>
              <string>UnsplashPaper</string>
              <key>CFBundleIdentifier</key>
              <string>com.unsplashpaper.app</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleExecutable</key>
              <string>UnsplashPaper</string>
              <key>LSUIElement</key>
              <true/>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          PLIST
      - name: Create DMG
        run: |
          mkdir dmg_staging
          cp -R UnsplashPaper.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "UnsplashPaper" -srcfolder dmg_staging -ov -format UDZO UnsplashPaper.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: UnsplashPaper-macOS
          path: UnsplashPaper.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests pystray Pillow pyinstaller
      - name: Build app
        run: python build.py

      - name: Build .deb package
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/128x128/apps

          cp dist/UnsplashPaper deb/usr/bin/unsplashpaper
          chmod +x deb/usr/bin/unsplashpaper

          cat > deb/DEBIAN/control << 'CTRL'
          Package: unsplashpaper
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: gir1.2-ayatanaappindicator3-0.1, python3-gi, python3-gi-cairo
          Maintainer: Teyk0o <https://github.com/Teyk0o>
          Description: Automatic wallpaper changer using Unsplash
           A lightweight tray app that sets a beautiful new desktop
           wallpaper from Unsplash every day.
          CTRL

          cat > deb/usr/share/applications/unsplashpaper.desktop << 'DESK'
          [Desktop Entry]
          Type=Application
          Name=UnsplashPaper
          Comment=Automatic wallpaper changer using Unsplash
          Exec=unsplashpaper
          Terminal=false
          Categories=Utility;Graphics;
          DESK

          dpkg-deb --build deb UnsplashPaper.deb

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps

          cp dist/UnsplashPaper AppDir/usr/bin/unsplashpaper
          chmod +x AppDir/usr/bin/unsplashpaper

          cat > AppDir/unsplashpaper.desktop << 'DESK'
          [Desktop Entry]
          Type=Application
          Name=UnsplashPaper
          Comment=Automatic wallpaper changer using Unsplash
          Exec=unsplashpaper
          Icon=unsplashpaper
          Terminal=false
          Categories=Utility;Graphics;
          DESK

          cp AppDir/unsplashpaper.desktop AppDir/usr/share/applications/

          # Generate a simple icon
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (128, 128), (0,0,0,0))
          draw = ImageDraw.Draw(img)
          draw.rounded_rectangle([8,8,120,120], radius=20, fill='white', outline=(80,80,80), width=3)
          draw.rounded_rectangle([28,36,100,92], radius=10, fill=(60,60,60))
          draw.polygon([(36,84),(56,56),(76,76),(88,60),(100,84)], fill=(100,180,100))
          draw.ellipse([76,40,96,60], fill=(255,220,80))
          img.save('AppDir/unsplashpaper.png')
          "
          cp AppDir/unsplashpaper.png AppDir/usr/share/icons/hicolor/128x128/apps/

          cat > AppDir/AppRun << 'RUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/unsplashpaper" "$@"
          RUN
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage AppDir UnsplashPaper.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: UnsplashPaper-Linux
          path: |
            UnsplashPaper.deb
            UnsplashPaper.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/UnsplashPaper-Windows/dist/UnsplashPaper.exe release/UnsplashPaper-Windows.exe
          cp artifacts/UnsplashPaper-Windows/installer_output/UnsplashPaper_Setup.exe release/UnsplashPaper_Setup-Windows.exe
          cp artifacts/UnsplashPaper-macOS/UnsplashPaper.dmg release/UnsplashPaper-macOS.dmg
          cp artifacts/UnsplashPaper-Linux/UnsplashPaper.deb release/UnsplashPaper-Linux.deb
          cp artifacts/UnsplashPaper-Linux/UnsplashPaper.AppImage release/UnsplashPaper-Linux.AppImage
          chmod +x release/UnsplashPaper-Linux.AppImage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
